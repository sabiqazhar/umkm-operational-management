<nav class="bg-white shadow-sm px-6 py-3 flex items-center justify-between">
    <div class="flex items-center gap-4">
        <button id="sidebar-toggle" class="md:hidden p-2 hover:bg-gray-100 rounded" onclick="toggleSidebar()">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path>
            </svg>
        </button>
        <h1 class="text-xl font-bold text-gray-800">UMKM POS</h1>
    </div>
    <div class="flex items-center gap-4">
        <span id="user-display" class="text-sm text-gray-600">Loading...</span>
        <button onclick="logout()" class="text-sm text-red-600 hover:text-red-800">Logout</button>
    </div>
</nav>

<script>
    // Show logged-in user
    var _userData = JSON.parse(localStorage.getItem('user') || '{}');
    if (_userData.nama_lengkap) {
        document.getElementById('user-display').textContent = _userData.nama_lengkap;
    }

    function toggleSidebar() {
        var sidebar = document.querySelector('#sidebar');
        var overlay = document.querySelector('#sidebar-overlay');
        if (sidebar) sidebar.classList.toggle('-translate-x-full');
        if (overlay) overlay.classList.toggle('hidden');
    }

    function logout() {
        localStorage.removeItem('token');
        localStorage.removeItem('user');
        window.location.href = 'login.html';
    }
</script>
