<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#2563eb">
    <title>Stok - UMKM POS</title>
    <script src="https://unpkg.com/htmx.org@2.0.4"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="static/js/config.js"></script>
    <script src="static/js/api.js"></script>
    <script src="static/js/auth.js"></script>
    <style>
        #sidebar { transition: transform 0.2s ease; }
        @media (min-width: 768px) { #sidebar { transform: translateX(0); } }
    </style>
</head>
<body class="bg-gray-100 min-h-screen flex">
    <div id="sidebar-container" hx-trigger="load" hx-get="partials/sidebar.html" hx-swap="innerHTML"></div>

    <div class="flex-1 flex flex-col min-h-screen">
        <div id="navbar-container" hx-trigger="load" hx-get="partials/navbar.html" hx-swap="innerHTML"></div>

        <main class="flex-1 p-6">
            <div class="max-w-7xl mx-auto">
                <h2 class="text-2xl font-bold mb-6">Manajemen Stok</h2>

                <!-- Tab Navigation -->
                <div class="flex flex-wrap gap-2 mb-6">
                    <button onclick="showTab('stock-levels')" id="tab-stock-levels-btn"
                        class="px-3 py-2 text-sm bg-blue-600 text-white rounded-md">Stok Saat Ini</button>
                    <button onclick="showTab('adjustment')" id="tab-adjustment-btn"
                        class="px-3 py-2 text-sm bg-gray-200 rounded-md hover:bg-gray-300">Adjustment</button>
                    <button onclick="showTab('logs')" id="tab-logs-btn"
                        class="px-3 py-2 text-sm bg-gray-200 rounded-md hover:bg-gray-300">Riwayat</button>
                </div>

                <!-- Tab: Stock Levels -->
                <div id="tab-stock-levels" class="bg-white rounded-lg shadow-sm overflow-x-auto">
                    <table class="w-full min-w-[500px]">
                        <thead class="bg-gray-50">
                            <tr>
                                <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase">Barcode</th>
                                <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase">Nama</th>
                                <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase">Stok</th>
                                <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase">Status</th>
                            </tr>
                        </thead>
                        <tbody id="stock-table" class="divide-y divide-gray-200">
                            <tr><td colspan="4" class="px-4 py-8 text-center text-gray-400">Memuat...</td></tr>
                        </tbody>
                    </table>
                </div>

                <!-- Tab: Adjustment -->
                <div id="tab-adjustment" class="hidden">
                    <div class="bg-white p-6 rounded-lg shadow-sm max-w-md">
                        <h3 class="text-lg font-bold mb-4">Adjustment Stok</h3>
                        <form id="adjustment-form" class="space-y-3">
                            <div>
                                <label class="block text-sm font-medium">Pilih Barang</label>
                                <select id="adj-item-id" required
                                    class="w-full border rounded-md px-3 py-2">
                                    <option value="">-- Pilih --</option>
                                </select>
                            </div>
                            <div>
                                <label class="block text-sm font-medium">Tipe</label>
                                <select id="adj-tipe" required
                                    class="w-full border rounded-md px-3 py-2">
                                    <option value="MASUK">MASUK (tambah stok)</option>
                                    <option value="KELUAR">KELUAR (kurangi stok)</option>
                                    <option value="ADJUSTMENT">ADJUSTMENT (set stok)</option>
                                </select>
                            </div>
                            <div>
                                <label class="block text-sm font-medium">Jumlah</label>
                                <input type="number" id="adj-qty" required min="1"
                                    class="w-full border rounded-md px-3 py-2">
                            </div>
                            <div>
                                <label class="block text-sm font-medium">Catatan</label>
                                <input type="text" id="adj-catatan" placeholder="Opsional"
                                    class="w-full border rounded-md px-3 py-2">
                            </div>
                            <button type="button" onclick="submitAdjustment()"
                                class="bg-yellow-500 text-white px-4 py-2 rounded-md hover:bg-yellow-600">
                                Simpan Adjustment
                            </button>
                        </form>
                        <div id="adj-result" class="mt-3 text-sm"></div>
                    </div>
                </div>

                <!-- Tab: Stock Logs -->
                <div id="tab-logs" class="hidden">
                    <div class="bg-white rounded-lg shadow-sm overflow-x-auto">
                        <table class="w-full min-w-[700px]">
                            <thead class="bg-gray-50">
                                <tr>
                                    <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase">Waktu</th>
                                    <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase">Barang</th>
                                    <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase">Tipe</th>
                                    <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase">Qty</th>
                                    <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase">Stok Awal</th>
                                    <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase">Stok Akhir</th>
                                    <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase">Referensi</th>
                                </tr>
                            </thead>
                            <tbody id="logs-table" class="divide-y divide-gray-200">
                                <tr><td colspan="7" class="px-4 py-8 text-center text-gray-400">Memuat...</td></tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script>
        var allItems = [];
        var allLogs = [];

        // ── Tab switching ────────────────────────────────────────────────────
        function showTab(tab) {
            ['stock-levels', 'adjustment', 'logs'].forEach(function(t) {
                document.getElementById('tab-' + t).classList.toggle('hidden', t !== tab);
                var btn = document.getElementById('tab-' + t + '-btn');
                btn.className = 'px-3 py-2 text-sm rounded-md ' +
                    (t === tab ? 'bg-blue-600 text-white' : 'bg-gray-200 hover:bg-gray-300');
            });
            if (tab === 'stock-levels') loadStockLevels();
            if (tab === 'logs') loadStockLogs();
            if (tab === 'adjustment') populateItemSelect();
        }

        // ── Stock Levels ─────────────────────────────────────────────────────
        function loadStockLevels() {
            callGAS('READ_ITEMS', {}).then(function(res) {
                if (!res.success) return;
                allItems = res.data || [];
                var tbody = document.getElementById('stock-table');
                if (allItems.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="4" class="px-4 py-8 text-center text-gray-400">Tidak ada barang</td></tr>';
                    return;
                }
                tbody.innerHTML = allItems.map(function(item) {
                    var stok = Number(item.stok_sekarang);
                    var isLow = stok <= 10;
                    return '<tr class="' + (isLow ? 'bg-red-50' : '') + '">' +
                        '<td class="px-4 py-3">' + item.barcode + '</td>' +
                        '<td class="px-4 py-3">' + item.nama_barang + '</td>' +
                        '<td class="px-4 py-3 ' + (isLow ? 'text-red-600 font-bold' : '') + '">' + stok + '</td>' +
                        '<td class="px-4 py-3">' +
                            (isLow
                                ? '<span class="text-red-600 font-semibold">⚠ Stok Menipis</span>'
                                : '<span class="text-green-600">✔ Aman</span>') +
                        '</td>' +
                    '</tr>';
                }).join('');
            });
        }

        // ── Stock Adjustment ─────────────────────────────────────────────────
        function populateItemSelect() {
            if (allItems.length === 0) {
                callGAS('READ_ITEMS', {}).then(function(res) {
                    if (res.success) {
                        allItems = res.data || [];
                        renderItemSelect();
                    }
                });
            } else {
                renderItemSelect();
            }
        }

        function renderItemSelect() {
            var sel = document.getElementById('adj-item-id');
            sel.innerHTML = '<option value="">-- Pilih --</option>' +
                allItems.map(function(i) {
                    return '<option value="' + i.item_id + '">' + i.nama_barang + ' (' + i.barcode + ') - Stok: ' + i.stok_sekarang + '</option>';
                }).join('');
        }

        function submitAdjustment() {
            var itemId = document.getElementById('adj-item-id').value;
            var tipe = document.getElementById('adj-tipe').value;
            var qty = document.getElementById('adj-qty').value;
            var catatan = document.getElementById('adj-catatan').value;

            if (!itemId || !tipe || !qty) {
                document.getElementById('adj-result').innerHTML = '<span class="text-red-600">Lengkapi semua field</span>';
                return;
            }

            var btn = event.target;
            btn.disabled = true;
            btn.textContent = 'Menyimpan...';

            callGAS('STOCK_ADJUSTMENT', {
                item_id: Number(itemId),
                tipe: tipe,
                qty: Number(qty),
                catatan: catatan
            }).then(function(res) {
                btn.disabled = false;
                btn.textContent = 'Simpan Adjustment';
                if (res.success) {
                    document.getElementById('adj-result').innerHTML = '<span class="text-green-600">Stok berhasil diadjust</span>';
                    document.getElementById('adj-qty').value = '';
                    document.getElementById('adj-catatan').value = '';
                    loadStockLevels();
                } else {
                    document.getElementById('adj-result').innerHTML = '<span class="text-red-600">' + (res.message || 'Gagal') + '</span>';
                }
            });
        }

        // ── Stock Logs ───────────────────────────────────────────────────────
        function loadStockLogs() {
            callGAS('GET_STOCK_LOGS', {}).then(function(res) {
                var tbody = document.getElementById('logs-table');
                if (!res.success || !res.data || res.data.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="7" class="px-4 py-8 text-center text-gray-400">Belum ada riwayat</td></tr>';
                    return;
                }
                allLogs = res.data;
                tbody.innerHTML = allLogs.map(function(log) {
                    var tipeClass = log.tipe === 'MASUK' ? 'text-green-600' :
                                    log.tipe === 'KELUAR' ? 'text-red-600' : 'text-yellow-600';
                    return '<tr>' +
                        '<td class="px-4 py-3 text-sm">' + (log.created_at || '').slice(0, 19).replace('T', ' ') + '</td>' +
                        '<td class="px-4 py-3">' + log.nama_barang + '</td>' +
                        '<td class="px-4 py-3 ' + tipeClass + ' font-semibold">' + log.tipe + '</td>' +
                        '<td class="px-4 py-3">' + log.qty + '</td>' +
                        '<td class="px-4 py-3">' + log.stok_sebelum + '</td>' +
                        '<td class="px-4 py-3">' + log.stok_sesudah + '</td>' +
                        '<td class="px-4 py-3 text-sm">' + (log.reference_id || '-') + '</td>' +
                    '</tr>';
                }).join('');
            });
        }

        // ── Init ────────────────────────────────────────────────────────────
        document.addEventListener('DOMContentLoaded', function() {
            showTab('stock-levels');
        });
    </script>
<script>if('serviceWorker'in navigator)navigator.serviceWorker.register('/sw.js')</script>
</body>
</html>
