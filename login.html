<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - UMKM POS</title>
    <script src="https://unpkg.com/htmx.org@2.0.4"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="static/js/config.js"></script>
    <script src="static/js/api.js"></script>
    <script src="static/js/auth.js"></script>
</head>
<body class="bg-gray-100 min-h-screen flex items-center justify-center">
    <div class="bg-white p-8 rounded-lg shadow-md w-96">
        <h1 class="text-2xl font-bold mb-2 text-center">UMKM POS</h1>
        <p class="text-sm text-gray-500 mb-6 text-center">Silakan login untuk melanjutkan</p>

        <form onsubmit="return handleLogin(event)" class="space-y-4">
            <div>
                <label class="block text-sm font-medium text-gray-700">Username</label>
                <input type="text" name="username" required
                    class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-blue-500 focus:ring-blue-500 border px-3 py-2">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700">Password</label>
                <input type="password" name="password" required
                    class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-blue-500 focus:ring-blue-500 border px-3 py-2">
            </div>
            <button type="submit"
                class="w-full bg-blue-600 text-white py-2 px-4 rounded-md hover:bg-blue-700">
                Login
            </button>
        </form>

        <div id="login-result" class="mt-4 text-sm text-center"></div>
    </div>

    <script>
        function handleLogin(event) {
            event.preventDefault();
            var username = document.querySelector('[name="username"]').value;
            var password = document.querySelector('[name="password"]').value;

            callGAS('LOGIN', { username: username, password: password })
                .then(function(res) {
                    var el = document.getElementById('login-result');
                    if (res.success && res.data && res.data.token) {
                        localStorage.setItem('token', res.data.token);
                        localStorage.setItem('user', JSON.stringify(res.data.user));
                        window.location.href = 'index.html';
                    } else {
                        el.innerHTML = '<span class="text-red-600">' + (res.message || 'Login gagal') + '</span>';
                    }
                });
            return false;
        }
    </script>
</body>
</html>
