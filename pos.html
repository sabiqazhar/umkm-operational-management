<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#2563eb">
    <title>POS - UMKM POS</title>
    <script src="https://unpkg.com/htmx.org@2.0.4"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="static/js/config.js"></script>
    <script src="static/js/api.js"></script>
    <script src="static/js/auth.js"></script>
    <script src="static/js/cart.js"></script>
    <style>
        #sidebar { transition: transform 0.2s ease; }
        @media (min-width: 768px) { #sidebar { transform: translateX(0); } }
        #products-grid { max-height: calc(100vh - 250px); overflow-y: auto; }
    </style>
</head>
<body class="bg-gray-100 min-h-screen flex">
    <div id="sidebar-container" hx-trigger="load" hx-get="partials/sidebar.html" hx-swap="innerHTML"></div>

    <div class="flex-1 flex flex-col min-h-screen">
        <div id="navbar-container" hx-trigger="load" hx-get="partials/navbar.html" hx-swap="innerHTML"></div>

        <main class="flex-1 flex flex-col md:flex-row">
            <!-- Products Section -->
            <div class="flex-1 p-6">
                <h1 class="text-2xl font-bold mb-4">Point of Sale</h1>

                <!-- Barcode Scanner -->
                <input type="text" id="barcode-input"
                    placeholder="Scan barcode atau ketik..."
                    class="w-full px-4 py-3 border-2 border-blue-500 rounded-lg focus:outline-none mb-4"
                    autofocus>

                <!-- Search -->
                <input type="text" id="search-input" placeholder="Cari produk..."
                    onkeyup="searchProducts(this.value)"
                    class="w-full px-4 py-2 border rounded-md mb-4">

                <!-- Products Grid -->
                <div id="products-grid" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-3">
                    <div class="col-span-full text-center text-gray-400 py-8" id="products-loading">Memuat produk...</div>
                </div>
            </div>

            <!-- Cart Section -->
            <div class="w-full md:w-96 bg-white shadow-lg p-6 flex flex-col">
                <h2 class="text-xl font-bold mb-4">Keranjang</h2>

                <div id="cart-items" class="flex-1 space-y-3 mb-4 overflow-y-auto max-h-[50vh]">
                    <p class="text-gray-500 text-center py-4">Keranjang kosong</p>
                </div>

                <div class="border-t pt-4 mt-auto">
                    <div class="flex justify-between mb-2">
                        <span class="font-medium">Total:</span>
                        <span id="cart-total" class="text-xl font-bold">Rp 0</span>
                    </div>

                    <div class="flex gap-2 mb-2">
                        <input type="number" id="bayar-input" placeholder="Jumlah bayar"
                            oninput="hitungKembalian()"
                            class="flex-1 border rounded-md px-3 py-2 text-lg font-bold text-right">
                    </div>
                    <div class="flex justify-between text-sm mb-4">
                        <span class="text-gray-500">Kembalian:</span>
                        <span id="kembalian-display" class="font-semibold">Rp 0</span>
                    </div>

                    <button id="checkout-btn" onclick="showPaymentModal()"
                        class="w-full bg-green-600 text-white py-3 rounded-lg hover:bg-green-700 disabled:bg-gray-400"
                        disabled>
                        Bayar
                    </button>
                </div>
            </div>
        </main>
    </div>

    <!-- Payment Confirmation Modal -->
    <div id="payment-modal" class="hidden fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50">
        <div class="bg-white p-6 rounded-lg w-full max-w-md mx-4 max-h-[90vh] overflow-y-auto">
            <h3 class="text-xl font-bold mb-4">Konfirmasi Pembayaran</h3>

            <div class="space-y-3 mb-4">
                <div class="flex justify-between">
                    <span>Total:</span>
                    <span id="modal-total" class="font-bold">Rp 0</span>
                </div>
                <div class="flex justify-between">
                    <span>Bayar:</span>
                    <span id="modal-bayar" class="font-bold">Rp 0</span>
                </div>
                <div class="flex justify-between text-lg">
                    <span>Kembalian:</span>
                    <span id="modal-kembalian" class="font-bold text-green-600">Rp 0</span>
                </div>
                <div>
                    <label class="block text-sm font-medium mb-1">Metode Pembayaran</label>
                    <select id="metode-pembayaran" class="w-full border rounded-md px-3 py-2">
                        <option value="CASH">Cash</option>
                        <option value="QRIS">QRIS</option>
                        <option value="TRANSFER">Transfer</option>
                    </select>
                </div>
            </div>

            <div class="flex gap-2">
                <button onclick="closePaymentModal()"
                    class="flex-1 bg-gray-300 py-2 rounded-md hover:bg-gray-400">Batal</button>
                <button onclick="submitTransaction()"
                    class="flex-1 bg-green-600 text-white py-2 rounded-md hover:bg-green-700">Konfirmasi</button>
            </div>
            <div id="payment-result" class="mt-3 text-sm"></div>
        </div>
    </div>

    <script>
        var allProducts = [];

        // ── Load Products ───────────────────────────────────────────────────
        document.addEventListener('DOMContentLoaded', function() {
            loadProducts();
        });

        function loadProducts() {
            callGAS('READ_ITEMS', {}).then(function(res) {
                if (res.success && res.data) {
                    allProducts = res.data;
                    renderProducts(allProducts);
                } else {
                    document.getElementById('products-loading').textContent = 'Gagal memuat produk';
                }
            });
        }

        function renderProducts(items) {
            var grid = document.getElementById('products-grid');
            if (items.length === 0) {
                grid.innerHTML = '<div class="col-span-full text-center text-gray-400 py-8">Tidak ada produk</div>';
                return;
            }
            grid.innerHTML = items.map(function(item) {
                var stok = Number(item.stok_sekarang);
                var stokClass = stok <= 0 ? 'text-red-500' : (stok <= 10 ? 'text-yellow-500' : 'text-green-500');
                var disabled = stok <= 0 ? 'opacity-50 cursor-not-allowed' : 'cursor-pointer hover:shadow-md';
                return '<div class="bg-white p-3 rounded-lg shadow ' + disabled + '" ' +
                        'onclick="' + (stok > 0 ? "addToCart(" + JSON.stringify(item).replace(/"/g, '&quot;') + ")" : "") + '">' +
                    '<h3 class="font-bold text-sm">' + item.nama_barang + '</h3>' +
                    '<p class="text-xs text-gray-500">' + item.barcode + '</p>' +
                    '<p class="text-blue-600 font-bold mt-1">Rp ' + Number(item.harga_jual).toLocaleString() + '</p>' +
                    '<p class="text-xs ' + stokClass + '">Stok: ' + stok + '</p>' +
                '</div>';
            }).join('');
        }

        // ── Search ──────────────────────────────────────────────────────────
        function searchProducts(q) {
            if (!q) { renderProducts(allProducts); return; }
            var lower = q.toLowerCase();
            var filtered = allProducts.filter(function(item) {
                return (item.nama_barang && item.nama_barang.toLowerCase().indexOf(lower) !== -1) ||
                       (item.barcode && item.barcode.indexOf(q) !== -1);
            });
            renderProducts(filtered);
        }

        // ── Barcode Scanner ─────────────────────────────────────────────────
        document.getElementById('barcode-input').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                var barcode = this.value.trim();
                if (!barcode) return;
                var product = allProducts.find(function(p) { return p.barcode === barcode; });
                if (product) {
                    addToCart(product);
                    showToast('✓ ' + product.nama_barang + ' ditambahkan', 'success');
                } else {
                    showToast('Produk dengan barcode ' + barcode + ' tidak ditemukan', 'error');
                }
                this.value = '';
            }
        });

        // ── Payment / Checkout ──────────────────────────────────────────────
        function hitungKembalian() {
            var total = getCartTotal();
            var bayar = Number(document.getElementById('bayar-input').value) || 0;
            var kembalian = bayar - total;
            document.getElementById('kembalian-display').textContent =
                'Rp ' + (kembalian > 0 ? kembalian.toLocaleString() : '0');
        }

        function showPaymentModal() {
            var total = getCartTotal();
            var bayar = Number(document.getElementById('bayar-input').value) || 0;
            var kembalian = bayar - total;

            if (bayar < total) {
                showToast('Jumlah bayar kurang dari total', 'error');
                return;
            }

            document.getElementById('modal-total').textContent = 'Rp ' + total.toLocaleString();
            document.getElementById('modal-bayar').textContent = 'Rp ' + bayar.toLocaleString();
            document.getElementById('modal-kembalian').textContent = 'Rp ' + (kembalian > 0 ? kembalian.toLocaleString() : '0');
            document.getElementById('payment-result').textContent = '';
            document.getElementById('payment-modal').classList.remove('hidden');
        }

        function closePaymentModal() {
            document.getElementById('payment-modal').classList.add('hidden');
        }

        function submitTransaction() {
            var total = getCartTotal();
            var bayar = Number(document.getElementById('bayar-input').value) || 0;
            var metode = document.getElementById('metode-pembayaran').value;

            var items = cart.map(function(i) {
                return { item_id: i.item_id, qty: i.qty };
            });

            var btn = document.querySelector('#payment-modal .bg-green-600');
            btn.disabled = true;
            btn.textContent = 'Memproses...';

            callGAS('CREATE_TRANSACTION', {
                items: items,
                bayar: bayar,
                metode_pembayaran: metode
            }).then(function(res) {
                btn.disabled = false;
                btn.textContent = 'Konfirmasi';
                if (res.success) {
                    showToast('✓ Transaksi ' + res.data.transaction_id + ' berhasil!', 'success');
                    closePaymentModal();
                    clearCart();
                    document.getElementById('bayar-input').value = '';
                    document.getElementById('kembalian-display').textContent = 'Rp 0';
                    loadProducts(); // refresh stock
                } else {
                    document.getElementById('payment-result').innerHTML =
                        '<span class="text-red-600">' + (res.message || 'Transaksi gagal') + '</span>';
                    showToast(res.message || 'Transaksi gagal', 'error');
                }
            });
        }

        // Override addToCart from cart.js to refresh checkout button state
        var _origRenderCart = renderCart;
        renderCart = function() {
            _origRenderCart();
            // Payment inputs state
            var total = getCartTotal();
            var checkoutBtn = document.getElementById('checkout-btn');
            if (checkoutBtn) checkoutBtn.disabled = (cart.length === 0);
        };
    </script>
<script>if('serviceWorker'in navigator)navigator.serviceWorker.register('/sw.js')</script>
</body>
</html>
